name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Coverage
        run: npm run coverage

      - name: Generate coverage badges
        run: node scripts/generate-coverage-badges.mjs

      - name: Build
        run: npm run build

      - name: Docker build
        run: docker build -t service-levels-application:ci .

      - name: Coverage summary
        run: |
          node <<'EOF'
          const { readFileSync } = require("node:fs");

          function printSummary(label, file) {
            const summary = JSON.parse(readFileSync(file, "utf8")).total;
            console.log(`${label}:`);
            console.log(`  statements ${summary.statements.pct}%`);
            console.log(`  branches   ${summary.branches.pct}%`);
            console.log(`  functions  ${summary.functions.pct}%`);
            console.log(`  lines      ${summary.lines.pct}%`);
          }

          printSummary("API coverage", "apps/api/coverage/coverage-summary.json");
          printSummary("Web coverage", "apps/web/coverage/coverage-summary.json");
          EOF

      - name: Upload API coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: api-coverage
          path: apps/api/coverage
          if-no-files-found: ignore

      - name: Upload web coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: web-coverage
          path: apps/web/coverage
          if-no-files-found: ignore

      - name: Publish coverage badges
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu

          remote_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          workspace_dir="${GITHUB_WORKSPACE}"
          publish_dir="$(mktemp -d)"

          if git clone --depth 1 --branch badges "${remote_url}" "${publish_dir}"; then
            :
          else
            rm -rf "${publish_dir}"
            publish_dir="$(mktemp -d)"
            git init "${publish_dir}"
            cd "${publish_dir}"
            git checkout --orphan badges
            git remote add origin "${remote_url}"
          fi

          mkdir -p "${publish_dir}/badges"
          cp "${workspace_dir}/.badges/api-coverage.json" "${publish_dir}/badges/api-coverage.json"
          cp "${workspace_dir}/.badges/web-coverage.json" "${publish_dir}/badges/web-coverage.json"
          touch "${publish_dir}/.nojekyll"

          cd "${publish_dir}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges .nojekyll

          if git diff --cached --quiet; then
            echo "Coverage badges are unchanged."
            exit 0
          fi

          git commit -m "Update coverage badges for ${GITHUB_SHA}"
          git push origin HEAD:badges
