services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: service_levels
      POSTGRES_USER: service_levels
      POSTGRES_PASSWORD: service_levels
    ports:
      - "5432:5432"
    volumes:
      - service_levels_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U service_levels -d service_levels"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: "${SERVICELEVELS_IMAGE:-ghcr.io/rmudingay/servicelevels}:${SERVICELEVELS_VERSION:-v0.2.0}"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "8080"
      APP_NAME: "Service Levels application"
      DATABASE_URL: "postgresql://service_levels:service_levels@db:5432/service_levels"
      THEME_DEFAULT: "light"
      PUBLIC_AUTH_MODE: "public"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "change-me"
      JWT_SECRET: "dev-secret-change-me"
      CORS_ORIGIN: "http://localhost:5173,http://127.0.0.1:5173"
      WORKER_TICK_SECONDS: "60"
    ports:
      - "8080:8080"

  worker:
    image: "${SERVICELEVELS_IMAGE:-ghcr.io/rmudingay/servicelevels}:${SERVICELEVELS_VERSION:-v0.2.0}"
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app
    command: ["npm", "run", "start:worker"]
    environment:
      PORT: "8080"
      APP_NAME: "Service Levels application"
      DATABASE_URL: "postgresql://service_levels:service_levels@db:5432/service_levels"
      THEME_DEFAULT: "light"
      PUBLIC_AUTH_MODE: "public"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "change-me"
      JWT_SECRET: "dev-secret-change-me"
      CORS_ORIGIN: "http://localhost:5173,http://127.0.0.1:5173"
      WORKER_TICK_SECONDS: "60"

volumes:
  service_levels_db_data:
    name: servicelevels_db_data
